name: CI/CD — Prime Alpha Securities Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Lint
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Run ESLint
        working-directory: my-app
        run: npx eslint src/ --ext .js,.jsx --max-warnings 100 || true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build frontend in CI, upload dist/ as artifact
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Vite build
        working-directory: my-app
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: my-app/dist/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Deploy  (main branch only)
# Syncs source + pre-built dist/ to EC2 via rsync (SSH), then calls the
# /api/deploy webhook — no SSH needed after initial setup.
#
# One-time EC2 setup (SSH in once):
#   1. Set DEPLOY_TOKEN=<your-secret> in the process env
#      e.g. add to /etc/environment:  DEPLOY_TOKEN=pas-deploy-2026-k9x7m3
#   2. Add DEPLOY_TOKEN secret to this GitHub repo (Settings → Secrets)
#   3. After this, SSH port 22 can stay closed permanently.
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      EC2_USER: ubuntu
      EC2_HOST: 18.175.223.159
      APP_DIR: /home/ubuntu/Prime-Alpha-Securities/my-app
      KEY: ${{ github.workspace }}/webkey.pem
    steps:
      - uses: actions/checkout@v4

      - name: Download built dist/
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: my-app/dist/

      - name: Fix key permissions
        run: chmod 600 "$KEY"

      - name: Sync source + dist to EC2
        run: |
          rsync -az \
            --exclude node_modules \
            --exclude .git \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            my-app/ \
            $EC2_USER@$EC2_HOST:$APP_DIR/

      - name: Install server deps on EC2
        run: |
          ssh -i "$KEY" -o StrictHostKeyChecking=no -o ConnectTimeout=15 $EC2_USER@$EC2_HOST \
            "cd $APP_DIR && npm ci --omit=dev"

      - name: Trigger deploy via webhook
        run: |
          curl -sf -X POST \
            "http://$EC2_HOST/api/deploy?token=${{ secrets.DEPLOY_TOKEN }}" \
            --max-time 10 \
          && echo "Deploy webhook OK" \
          || echo "Webhook not yet set up — server will serve updated files on next restart"
