name: CI/CD — Prime Alpha Securities Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: my-app

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Lint
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 100 || true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build (smoke test — verifies Vite compiles cleanly)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Vite build
        run: npm run build

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Deploy to EC2 (main branch only)
# Mirrors the existing Jenkins pattern: rsync + deploy.sh
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          chmod 600 webkey.pem
        working-directory: /home/runner/work/Website/Website

      - name: Sync files to EC2
        run: |
          rsync -avz \
            --exclude node_modules \
            --exclude .git \
            --exclude dist \
            -e "ssh -i webkey.pem -o StrictHostKeyChecking=no" \
            my-app/ \
            ubuntu@18.175.223.159:/home/ubuntu/Prime-Alpha-Securities/my-app/

      - name: Run deploy script on EC2
        run: |
          ssh -i webkey.pem -o StrictHostKeyChecking=no ubuntu@18.175.223.159 \
            "cd /home/ubuntu/Prime-Alpha-Securities/my-app && sudo bash deploy.sh"
