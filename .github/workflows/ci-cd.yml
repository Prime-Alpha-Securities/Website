name: CI/CD — Prime Alpha Securities Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Lint
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Run ESLint
        working-directory: my-app
        run: npx eslint src/ --ext .js,.jsx --max-warnings 100 || true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build  (Vite smoke test)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Vite build
        working-directory: my-app
        run: npm run build

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Deploy to EC2  (main branch only)
# rsync changed files → EC2, then run deploy.sh to reinstall + restart server
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      EC2: ubuntu@18.175.223.159
      APP: /home/ubuntu/Prime-Alpha-Securities/my-app
      KEY: ${{ github.workspace }}/webkey.pem
    steps:
      - uses: actions/checkout@v4

      - name: Fix key permissions
        run: chmod 600 "$KEY"

      - name: Sync files to EC2
        run: |
          rsync -avz \
            --exclude node_modules \
            --exclude .git \
            --exclude dist \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no" \
            my-app/ \
            $EC2:$APP/

      - name: Install deps & restart server on EC2
        run: |
          ssh -i "$KEY" -o StrictHostKeyChecking=no $EC2 "
            set -e
            cd $APP
            npm ci --omit=dev
            npm run build
            sudo systemctl restart pas-website 2>/dev/null || \
            sudo pm2 restart pas-website 2>/dev/null || \
            (pkill -f 'node server.js' 2>/dev/null; nohup node server.js > /tmp/pas.log 2>&1 &)
            echo 'Deploy complete'
          "
